{% extends "base.html" %}

{% block content %}

<h2 class="title">📄 Prescriptions</h2>

<div class="container" style="align-items:flex-start;">

    <div class="card fade-in" style="width: 80%;">

        {% if data %}
        <table>
            <tr>
                <th>ID</th>
                <th>Doctor</th>
                <th>Patient</th>
                <th>Medicine</th>
                <th>Date</th>
            </tr>

            {% for p in data %}
            <tr>
                <td>{{ p[0] }}</td>
                <td>{{ p[1] }}</td>
                <td>{{ p[2] }}</td>
                <td>{{ p[3] }}</td>
                <td>{{ p[4] }}</td>
            </tr>
            {% endfor %}
        </table>
        {% else %}
            <p>No prescriptions available</p>
        {% endif %}

    </div>

</div>

{% endblock %}
