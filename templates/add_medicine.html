{% extends 'base.html' %}
{% block title %}Add Medicine{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1>Add Medicine</h1>
    <p class="page-subtitle">Add a new medicine to the inventory</p>
  </div>
  <a href="{{ url_for('pharmacist') }}" class="btn btn-secondary">← Back</a>
</div>

<div class="card" style="max-width:580px;">
  <div class="card-body">
    <form method="POST" action="{{ url_for('add_medicine') }}">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="id">Medicine ID <span class="required">*</span></label>
          <input class="form-control" type="number" id="id" name="id"
                 placeholder="Unique integer ID" min="1" required>
          <span class="form-hint">Must be a unique positive number.</span>
        </div>
        <div class="form-group">
          <label class="form-label" for="name">Medicine Name <span class="required">*</span></label>
          <input class="form-control" type="text" id="name" name="name"
                 placeholder="e.g. Paracetamol 500mg" maxlength="100" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="stock">Stock (units) <span class="required">*</span></label>
          <input class="form-control" type="number" id="stock" name="stock"
                 placeholder="e.g. 200" min="1" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="price">Price (₹) <span class="required">*</span></label>
          <input class="form-control" type="number" id="price" name="price"
                 placeholder="e.g. 12.50" step="0.01" min="0" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="expiry">Expiry Date <span class="required">*</span></label>
        <input class="form-control" type="date" id="expiry" name="expiry" required>
      </div>

      <div style="display:flex; gap:.75rem; margin-top:1.5rem;">
        <button type="submit" class="btn btn-primary">Add to Inventory</button>
        <a href="{{ url_for('pharmacist') }}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
