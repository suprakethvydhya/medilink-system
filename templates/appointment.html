{% extends 'base.html' %}
{% block title %}Book Appointment{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1>Book Appointment</h1>
    <p class="page-subtitle">Schedule a new appointment with a doctor</p>
  </div>
  <a href="{{ url_for('patient') }}" class="btn btn-secondary">← Back</a>
</div>

<div class="card" style="max-width:560px;">
  <div class="card-body">
    <form method="POST" action="{{ url_for('book_appointment') }}">
      <div class="form-group">
        <label class="form-label" for="pname">Patient Name <span class="required">*</span></label>
        <input class="form-control" type="text" id="pname" name="pname"
               value="{{ session.user }}" placeholder="Patient name" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="dname">Doctor Name <span class="required">*</span></label>
        <input class="form-control" type="text" id="dname" name="dname"
               placeholder="Enter doctor's name" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="symptoms">Symptoms</label>
        <textarea class="form-control" id="symptoms" name="symptoms" rows="3"
                  placeholder="Describe your symptoms (optional)"
                  style="resize:vertical; font-family:inherit;"></textarea>
      </div>

      <div class="form-group">
        <label class="form-label" for="date">Appointment Date <span class="required">*</span></label>
        <input class="form-control" type="date" id="date" name="date"
               min="{{ today }}" required>
        <span class="form-hint">Dates in the past are not allowed.</span>
      </div>

      <div style="display:flex; gap:.75rem; margin-top:1.5rem;">
        <button type="submit" class="btn btn-primary">Book Appointment</button>
        <a href="{{ url_for('patient') }}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
