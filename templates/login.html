{% extends 'base.html' %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-brand">
  <span class="auth-brand-icon">⚕</span>
  <h1>MediLink</h1>
  <p>Pharmacy Management System</p>
</div>

<div class="auth-card">
  <h2 style="font-size:1.25rem; margin-bottom:1.5rem; color:var(--teal-900);">Sign in to your account</h2>

  <form method="POST" action="{{ url_for('login') }}">
    <div class="form-group">
      <label class="form-label" for="username">Username <span class="required">*</span></label>
      <input class="form-control" type="text" id="username" name="username"
             placeholder="Enter your username" autocomplete="username" required>
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Password <span class="required">*</span></label>
      <input class="form-control" type="password" id="password" name="password"
             placeholder="Enter your password" autocomplete="current-password" required>
    </div>

    <button type="submit" class="btn btn-primary btn-lg" style="width:100%; margin-top:.5rem;">
      Sign In
    </button>
  </form>
</div>

<p class="auth-footer">
  Don't have an account? <a href="{{ url_for('signup') }}">Create one</a>
</p>
{% endblock %}
