{% extends 'base.html' %}
{% block title %}Sign Up{% endblock %}

{% block content %}
<div class="auth-brand">
  <span class="auth-brand-icon">⚕</span>
  <h1>MediLink</h1>
  <p>Create a new account</p>
</div>

<div class="auth-card">
  <h2 style="font-size:1.25rem; margin-bottom:1.5rem; color:var(--teal-900);">Register</h2>

  <form method="POST" action="{{ url_for('signup') }}">
    <div class="form-group">
      <label class="form-label" for="username">Username <span class="required">*</span></label>
      <input class="form-control" type="text" id="username" name="username"
             placeholder="Choose a username" maxlength="50" autocomplete="username" required>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label" for="password">Password <span class="required">*</span></label>
        <input class="form-control" type="password" id="password" name="password"
               placeholder="Min. 8 characters" autocomplete="new-password" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="confirm">Confirm Password <span class="required">*</span></label>
        <input class="form-control" type="password" id="confirm" name="confirm"
               placeholder="Repeat password" autocomplete="new-password" required>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label" for="role">Role <span class="required">*</span></label>
      <select class="form-control" id="role" name="role" required>
        <option value="" disabled selected>Select your role</option>
        <option value="doctor">Doctor</option>
        <option value="patient">Patient</option>
        <option value="pharmacist">Pharmacist</option>
      </select>
    </div>

    <button type="submit" class="btn btn-primary btn-lg" style="width:100%; margin-top:.5rem;">
      Create Account
    </button>
  </form>
</div>

<p class="auth-footer">
  Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
</p>
{% endblock %}
