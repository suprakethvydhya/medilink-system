{% extends 'base.html' %}
{% block title %}500 — Server Error{% endblock %}

{% block content %}
<div class="error-page">
  <div class="error-code">500</div>
  <h2>Something Went Wrong</h2>
  <p>An internal server error occurred. Please try again or contact your administrator.</p>
  <a href="{{ url_for('dashboard') if session.user else url_for('login') }}"
     class="btn btn-primary">← Go Home</a>
</div>
{% endblock %}
