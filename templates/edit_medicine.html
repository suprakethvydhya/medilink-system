{% extends 'base.html' %}
{% block title %}Edit Medicine{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1>Edit Medicine</h1>
    <p class="page-subtitle">ID: {{ med.Medicine_ID }} — {{ med.Medicine_Name }}</p>
  </div>
  <a href="{{ url_for('view_medicine') }}" class="btn btn-secondary">← Back</a>
</div>

<div class="card" style="max-width:560px;">
  <div class="card-body">
    <form method="POST">
      <div class="form-group">
        <label class="form-label">Medicine ID</label>
        <input class="form-control" type="text" value="{{ med.Medicine_ID }}" disabled
               style="background:var(--gray-100); color:var(--gray-500);">
        <span class="form-hint">Medicine ID cannot be changed after creation.</span>
      </div>

      <div class="form-group">
        <label class="form-label" for="name">Medicine Name <span class="required">*</span></label>
        <input class="form-control" type="text" id="name" name="name"
               value="{{ med.Medicine_Name }}" placeholder="Medicine name" maxlength="100" required>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="stock">Stock (units) <span class="required">*</span></label>
          <input class="form-control" type="number" id="stock" name="stock"
                 value="{{ med.Stock }}" min="1" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="price">Price (₹) <span class="required">*</span></label>
          <input class="form-control" type="number" id="price" name="price"
                 value="{{ med.Price }}" step="0.01" min="0" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="expiry">Expiry Date <span class="required">*</span></label>
        <input class="form-control" type="date" id="expiry" name="expiry"
               value="{{ med.Expiry_Date }}" required>
      </div>

      <div style="display:flex; gap:.75rem; margin-top:1.5rem;">
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="{{ url_for('view_medicine') }}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
